<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Stack UI</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <script defer src="tailwind.config.js"></script>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-gray-100 h-screen flex flex-col items-center justify-center font-sans"
  >
    <main class="w-full max-w-md p-6 flex flex-col items-center gap-8">
      <div id="card-stack" class="relative w-80 h-48 perspective-1000">
        <div
          class="card card-pos-3 absolute w-full h-full bg-white rounded-xl shadow-lg border border-gray-200 p-5 flex flex-col justify-between"
        >
          <div class="text-sm text-gray-500 font-semibold">Call</div>
          <div class="text-lg font-bold text-gray-800">
            Discuss Architecture
          </div>
          <div class="text-xs text-gray-400">Due: Tomorrow, 10:00 AM</div>
        </div>

        <div
          class="card card-pos-2 absolute w-full h-full bg-white rounded-xl shadow-lg border border-gray-200 p-5 flex flex-col justify-between"
        >
          <div class="text-sm text-blue-500 font-semibold">Reminder</div>
          <div class="text-lg font-bold text-gray-800">Review PR #42</div>
          <div class="text-xs text-gray-400">Due: Today, 5:00 PM</div>
        </div>

        <div
          class="card card-pos-1 absolute w-full h-full bg-white rounded-xl shadow-xl border border-gray-200 p-5 flex flex-col justify-between"
        >
          <div class="text-sm text-red-500 font-semibold">High Priority</div>
          <div class="text-lg font-bold text-gray-800">
            Deploy to Production
          </div>
          <div class="text-xs text-gray-400">Due: Today, 2:00 PM</div>
        </div>
      </div>

      <div class="flex items-center gap-4 mt-4">
        <button
          id="btn-up"
          class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg font-semibold transition-colors shadow-sm"
        >
          ↑ Up
        </button>
        <button
          id="btn-down"
          class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg font-semibold transition-colors shadow-sm"
        >
          ↓ Down
        </button>
        <button
          id="btn-add"
          class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-colors shadow-md"
        >
          + Add Card
        </button>
      </div>
    </main>

    <div
      id="add-modal"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 transform transition-all"
      >
        <h2 class="text-xl font-bold text-gray-800 mb-4">Add New Record</h2>

        <form id="add-form" class="flex flex-col gap-4">
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input
                type="radio"
                name="type"
                value="reminder"
                class="text-blue-600 focus:ring-blue-500"
                checked
              />
              <span class="text-sm font-medium text-gray-700">Reminder</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input
                type="radio"
                name="type"
                value="call"
                class="text-blue-600 focus:ring-blue-500"
              />
              <span class="text-sm font-medium text-gray-700">Call</span>
            </label>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Title</label
            >
            <input
              type="text"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Enter title..."
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Date & Time</label
            >
            <input
              type="datetime-local"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
          </div>

          <div class="flex justify-end gap-3 mt-4">
            <button
              type="button"
              id="btn-close-modal"
              class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors"
            >
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
